name: Verify
on:
  workflow_call:
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Clone repository
        uses: actions/checkout@v6


      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Audit dependencies
        run: pnpm audit

      - name: Check repo
        run: pnpm check:repo

      - name: Check code
        run: pnpm check

      - name: Check for unapplied lint or format fixes
        run: git diff --exit-code

  build:
    name: Build
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Clone repository
        uses: actions/checkout@v6


      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Build
        run: pnpm build

      - name: Check exports drift
        run: git diff --exit-code package.json test/tsconfig.json

      - name: Publint
        run: pnpm test:build

      - name: Check for unused files, dependencies, and exports
        run: pnpm knip

      - name: Check size
        run: pnpm size

  types:
    name: Types
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # JS-based tsc (5.9/6) runs ~10 minutes on 2-core runners.
    timeout-minutes: 15
    strategy:
      matrix:
        version: ['5.9.3', '6', '7', 'latest']

    steps:
      - name: Clone repository
        uses: actions/checkout@v6


      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - run: pnpm i -d -w typescript@${{ matrix.version }}

      - name: Build contracts
        shell: bash
        run: pnpm contracts:build

      - name: Check types
        run: pnpm check:types

      # Attest benches with its own pinned typescript 5.9.3 (see .pnpmfile.cjs),
      # so instantiation counts are matrix-independent; one leg is enough.
      - name: Bench types
        if: ${{ matrix.version == '5.9.3' }}
        run: pnpm bench:types
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  test:
    name: 'Test Core Local (transport: ${{ matrix.transport-mode }}, multicall: ${{ matrix.multicall }}, ${{ matrix.shard }}/${{ matrix.total-shards }})'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    strategy:
      max-parallel: 3
      matrix:
        multicall: ['true', 'false']
        transport-mode: ['http']
        shard: [1, 2, 3]
        total-shards: [3]
    steps:
      - name: Clone repository
        uses: actions/checkout@v6


      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Build contracts
        shell: bash
        run: pnpm contracts:build

      - name: Test Local
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: pnpm test --bail=1 --coverage --project core --shard=${{ matrix.shard }}/${{ matrix.total-shards }}
        env:
          CI: true
          VITE_ANVIL_FORK_URL: ${{ secrets.VITE_ANVIL_FORK_URL }}
          VITE_ANVIL_FORK_URL_OPTIMISM: ${{ secrets.VITE_ANVIL_FORK_URL_OPTIMISM }}
          VITE_ANVIL_FORK_URL_OPTIMISM_SEPOLIA: ${{ secrets.VITE_ANVIL_FORK_URL_OPTIMISM_SEPOLIA }}
          VITE_ANVIL_FORK_URL_SEPOLIA: ${{ secrets.VITE_ANVIL_FORK_URL_SEPOLIA }}
          VITE_ANVIL_FORK_URL_ZKSYNC: ${{ secrets.VITE_ANVIL_FORK_URL_ZKSYNC }}
          VITE_BATCH_MULTICALL: ${{ matrix.multicall }}
          VITE_NETWORK_TRANSPORT_MODE: ${{ matrix.transport-mode }}
          VITE_SHARD_ID: ${{ matrix.shard }}

      # Fork workflows cannot authenticate to Codecov for this private repository.
      - name: Upload coverage reports to Codecov
        if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@v6
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./coverage/lcov.info
          use_oidc: true

  test-tempo-deployed:
    name: 'Test Deployed Tempo (env: ${{ matrix.node-env }}, e2e)'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        node-env: 
          - testnet
          # - mainnet
    steps:
      - name: Clone repository
        uses: actions/checkout@v6


      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Run tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: pnpm test --bail=1 --project tempo e2e
        env:
          CI: true
          VITE_TEMPO_CREDENTIALS: ${{ secrets.VITE_TEMPO_CREDENTIALS }}
          VITE_TEMPO_ENV: ${{ matrix.node-env }}

  test-tempo-multisig:
    name: Test Local Tempo Multisig
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Build contracts
        run: pnpm contracts:build

      - name: Run tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: pnpm test --run --bail=1 --project tempo-multisig
        env:
          CI: true
          VITE_TEMPO_ENV: localnet
          VITE_TEMPO_MULTISIG: 'true'
          VITE_TEMPO_TAG: sha-6d831c2

  test-tempo:
    name: Test Local Tempo (${{ matrix.hardfork }}, ${{ matrix.shard }}/${{ matrix.total-shards }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        hardfork: [T7, T8, T9]
        shard: [1, 2, 3]
        total-shards: [3]
        include:
          - hardfork: T7
            tempo-tag: sha-f56f173
            zone-tag: sha-aae82c4
            zone-xtask-tag: ''
          - hardfork: T8
            tempo-tag: sha-e828ab7
            zone-tag: sha-aae82c4
            zone-xtask-tag: ''
          - hardfork: T9
            tempo-tag: sha256:290c7c1843cc8fbc8c0e5e37025c5373050d21004e4d22f4b00f978dfbee4c47
            zone-tag: sha256:2cb2d54c6d5b0473c1d0fc112d806fcb80a21516b660d4ab6e1bb0bcc7a97896
            zone-xtask-tag: sha256:57bdf58caf4654eef2615260b19c1b65d8823af150e95643d0619a97dcbba3bd

    steps:
      - name: Clone repository
        uses: actions/checkout@v6


      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Build contracts
        run: pnpm contracts:build

      - name: Test Local Tempo
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: pnpm test --run --bail=1 --coverage --project tempo --shard=${{ matrix.shard }}/${{ matrix.total-shards }}
        env:
          CI: true
          VITE_TEMPO_ENV: localnet
          VITE_TEMPO_HARDFORK: ${{ matrix.hardfork }}
          VITE_TEMPO_TAG: ${{ matrix.tempo-tag }}
          VITE_TEMPO_ZONES: 'true'
          VITE_TEMPO_ZONE_TAG: ${{ matrix.zone-tag }}
          VITE_TEMPO_ZONE_XTASK_TAG: ${{ matrix.zone-xtask-tag }}

      - name: Upload coverage reports to Codecov
        if: github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@v6
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./coverage/lcov.info
          use_oidc: true

  test-envs:
    name: Test Environments
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        type: ['bun', 'node-22', 'node-latest', 'next', 'tsc', 'vite']
        include:
          - type: bun
            runtime: bun
          - type: node-22
            node-version: 22
            runtime: node
          - type: node-latest
            node-version: latest
            runtime: node
          - type: next
            runtime: next
          - type: tsc
            node-version: 22
            runtime: tsc
          - type: vite
            runtime: vite

    steps:
      - name: Clone repository
        uses: actions/checkout@v6


      - name: Set up foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24.5

      - name: Install dependencies
        run: pnpm install

      - name: Set up Bun
        if: ${{ matrix.runtime == 'bun' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.30

      - name: Set up Node
        if: ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Playwright Browsers
        if: ${{ matrix.runtime == 'next' || matrix.runtime == 'vite' }}
        run: pnpx playwright@1.59.1 install --with-deps

      - name: Build
        run: pnpm build

      - name: Link
        run: pnpm install

      - name: Run tests
        run: pnpm test:env:${{ matrix.runtime }}

  wagmi:
    name: Wagmi
    # TODO: Re-enable once wagmi is compatible with the v3 API.
    if: false
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        typescript-version: ['5.9.3', 'latest']

    steps:
      - name: Clone repository
        uses: actions/checkout@v6


      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Set TypeScript version
        run: |
          pnpm install -D -w typescript@${{ matrix.typescript-version }}
          node -e "import fs from 'fs'; const p = JSON.parse(fs.readFileSync('./package.json', 'utf8')); p.pnpm = p.pnpm || {}; p.pnpm.overrides = p.pnpm.overrides || {}; p.pnpm.overrides.typescript = '${{ matrix.typescript-version }}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2));"
          pnpm install --no-frozen-lockfile

      - name: Setup wagmi
        uses: ./.github/actions/setup-wagmi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check types
        run: pnpm check:types
        working-directory: ./wagmi

      - name: Bench types
        run: pnpm bench:types
        working-directory: ./wagmi

      - name: Check build
        run: pnpm build
        working-directory: ./wagmi
