schema_version = "1.4"

[task]
name = "viem/tokens-predefined-usdc"
version = "1.0.0"
description = "Resolve the predefined USDC token's mainnet address and read its on-chain metadata."

[metadata]
area = "tokens"
tier = "anvil-fork"

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 900.0

[environment]
build_timeout_sec = 1200.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
